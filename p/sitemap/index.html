<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sơ đồ cấu trúc phân cấp và cây thư mục các trang thông tin, ứng dụng và bài viết trên website adapalen.">
  <title>adapalen | Sơ Đồ Cấu Trúc Website (Sitemap)</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../style.css">
  <style>
    .sitemap-tree-section {
      margin-bottom: 2.5rem;
    }
    .sitemap-section-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .sitemap-section-header i {
      color: var(--accent-color);
      font-size: 1.3rem;
    }
    .sitemap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }
    .sitemap-card {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.02);
      transition: transform 0.25 ease, border-color 0.25s ease, box-shadow 0.25s ease;
      position: relative;
    }
    .sitemap-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-color);
      box-shadow: 0 8px 24px 0 rgba(0, 240, 255, 0.12);
    }
    .sitemap-icon-box {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(var(--btn-bg-rgb), 0.08);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent-color);
      flex-shrink: 0;
    }
    .sitemap-content {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex-grow: 1;
    }
    .sitemap-link {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .sitemap-card:hover .sitemap-link {
      color: var(--accent-color);
    }
    .sitemap-desc {
      font-size: 0.86rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .sitemap-badges {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      margin-top: 0.4rem;
      font-size: 0.76rem;
      color: var(--text-secondary);
    }
    .badge-priority {
      background: rgba(var(--btn-bg-rgb), 0.1);
      color: var(--accent-color);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      border: 1px solid var(--glass-border);
    }
    .xml-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      transition: all 0.2s ease;
      background: rgba(var(--btn-bg-rgb), 0.05);
    }
    .xml-btn:hover {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px var(--accent-glow);
    }
  </style>
</head>
<body class="portfolio-page">
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <i class="fa-solid fa-code logo-icon"></i>
        <div>
          <h1 id="main-title">adapalen</h1>
          <p class="subtitle">Full Stack Engineer & Data Enthusiast</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="../../index.html" class="nav-item"><i class="fa-solid fa-house"></i> Trang chủ</a>
        <a href="../about/index.html" class="nav-item"><i class="fa-solid fa-user"></i> Giới thiệu</a>
        <a href="../../index.html#projects" class="nav-item"><i class="fa-solid fa-folder-open"></i> Dự án</a>
        <a href="../blogs/index.html" class="nav-item"><i class="fa-solid fa-book"></i> Blog</a>
        <a href="#" class="nav-item active"><i class="fa-solid fa-sitemap"></i> Sơ đồ trang</a>
        <a href="../../index.html#contact" class="nav-item"><i class="fa-solid fa-envelope"></i> Liên hệ</a>
      </nav>
      <div class="header-controls">
        <button id="theme-toggle" class="btn-icon glass" title="Chuyển chế độ Sáng/Tối">
          <i class="fa-solid fa-moon"></i>
        </button>
      </div>
    </header>

    <!-- Sitemap Main Section -->
    <section class="portfolio-section glass" style="padding: 2.5rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <div>
          <h2 class="section-title" style="margin-bottom: 0.4rem;"><i class="fa-solid fa-sitemap"></i> Sơ đồ phân cấp Website</h2>
          <p style="color: var(--text-secondary); font-size: 0.95rem;">Cây thư mục kiến trúc toàn bộ các trang thông tin, ứng dụng web và kho bài viết kỹ thuật.</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <a href="../../sitemap.xml" target="_blank" class="xml-btn"><i class="fa-solid fa-code"></i> sitemap.xml (SEO)</a>
          <a href="../../index.html" class="blog-back-btn"><i class="fa-solid fa-arrow-left"></i> Trang chủ</a>
        </div>
      </div>

      <div id="sitemap-tree-container">
        <!-- Dynamic Hierarchical Tree content will be injected here -->
        <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
          <i class="fa-solid fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-color);"></i>
          <p>Đang tải cấu trúc phân cấp sơ đồ trang...</p>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Theme toggle script
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    
    if (savedTheme === 'light') {
      document.body.classList.add('light-theme');
      themeToggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
    } else {
      document.body.classList.remove('light-theme');
      themeToggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
    }

    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeToggle.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });

    // Dynamic sitemap tree fetch
    async function loadSitemapTree() {
      const container = document.getElementById('sitemap-tree-container');
      try {
        const response = await fetch('sitemap.json');
        if (!response.ok) throw new Error('Không thể tải file cấu trúc sitemap.json');
        const data = await response.json();
        
        let html = '';
        data.sections.forEach(sec => {
          html += `
            <div class="sitemap-tree-section">
              <div class="sitemap-section-header">
                <i class="${sec.icon}"></i>
                <span>${sec.name} (${sec.pages.length})</span>
              </div>
              <div class="sitemap-grid">
          `;

          sec.pages.forEach(p => {
            let href = p.url;
            if (href === '/') {
              href = '../../index.html';
            } else if (href.startsWith('/')) {
              href = '../..' + href;
              if (href.endsWith('/')) {
                href += 'index.html';
              }
            }

            html += `
              <div class="sitemap-card">
                <div class="sitemap-icon-box">
                  <i class="${p.icon}"></i>
                </div>
                <div class="sitemap-content">
                  <a href="${href}" class="sitemap-link">${p.title}</a>
                  <p class="sitemap-desc">${p.description || 'Trang thông tin trực thuộc hệ thống.'}</p>
                  <div class="sitemap-badges">
                    <span class="badge-priority">Độ ưu tiên: ${p.priority}</span>
                    <span><i class="fa-regular fa-clock"></i> ${p.lastModified}</span>
                  </div>
                </div>
              </div>
            `;
          });

          html += `
              </div>
            </div>
          `;
        });
        
        container.innerHTML = html;
      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div style="text-align: center; padding: 2rem; border-radius: 12px; border: 1px dashed var(--red); background: rgba(255, 61, 0, 0.05); color: var(--text-primary);">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 2rem; margin-bottom: 1rem; color: var(--red);"></i>
            <h4>Không thể tải sơ đồ phân cấp</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">${err.message}</p>
          </div>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', loadSitemapTree);
  </script>
</body>
</html>
